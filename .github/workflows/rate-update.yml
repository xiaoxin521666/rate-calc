name: 自动更新汇率
on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  update-frequency:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 配置Node24
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: 安装axios依赖
        run: |
          npm init -y
          npm install axios --save

      - name: 运行汇率更新脚本
        run: node updateRate.js

      - name: 提交修改
        run: |
          git config --global user.name "xiaoxin521666"
          git config --global user.email "15308450587@163.com"
          git add index.html
          git diff --quiet && git diff --staged --quiet || (git commit -m "自动更新汇率" && git push)
