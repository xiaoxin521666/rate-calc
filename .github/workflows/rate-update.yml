name: 自动更新汇率
on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  update-frequency:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 配置Node24
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: 安装axios
        run: npm init -y && npm install axios --save

      - name: 执行更新脚本
        run: node updateRate.js

      - name: 提交修改
        run: |
          git config user.name "小新521666"
          git config user.email "填你GitHub邮箱"
          git add index.html
          git diff --quiet && git diff --staged --quiet || (git commit -m "自动更新UAH汇率" && git push)
