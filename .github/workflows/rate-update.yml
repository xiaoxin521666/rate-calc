name: 自动更新汇率
on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

# 关键配置：给流程授予仓库读写权限
permissions:
  contents: write

jobs:
  update-frequency:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # 自带token用于提交推送
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 配置Node24
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 安装axios
        run: npm init -y && npm install axios --save

      - name: 执行更新脚本
        run: node updateRate.js

      - name: 提交修改并推送
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          # 无文件变更直接跳过提交，避免空提交报错
          git diff --quiet && git diff --staged --quiet || (git commit -m "自动更新UAH兑人民币汇率" && git push)
