name: 每小时更新国内UAH兑CNY汇率
on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *' # UTC每小时自动执行

permissions:
  contents: write

jobs:
  update-rate:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取仓库文件
        uses: actions/checkout@v4

      - name: 配置Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 切换国内npm镜像
        run: npm config set registry https://registry.npmmirror.com

      - name: 安装axios请求库
        run: npm install axios --no-save

      - name: 执行国内汇率更新脚本
        run: node updateRate.js

      - name: 提交更新
        run: |
          git config user.name "国内汇率自动机器人"
          git config user.email "auto-rate@github.com"
          git add index.html
          if git diff --cached --quiet; then
            echo "汇率无变动，跳过提交"
          else
            git commit -m "自动更新国内行情UAH兑人民币汇率"
            git push
          fi
