name: 定时更新汇率
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 关键：授予读写仓库权限
    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }} # 内置授权令牌
      - name: 安装node环境
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: 安装axios依赖
        run: npm install axios
      - name: 执行汇率更新脚本
        run: node updateRate.js
      - name: 提交更新后的页面
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add index.html
          git commit -m "自动更新实时汇率"
          git push
