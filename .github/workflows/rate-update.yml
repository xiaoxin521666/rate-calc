name: 每小时自动更新UAH汇率
on:
  workflow_dispatch: # 支持手动点运行测试
  schedule:
    - cron: '0 * * * *' # UTC时区每小时执行一次（你的每小时自动更新）

permissions:
  contents: write # 允许bot提交修改文件

jobs:
  update-exchange:
    runs-on: ubuntu-latest
    steps:
      # 1、拉取仓库代码
      - name: 拉取仓库文件
        uses: actions/checkout@v4

      # 2、配置Node.js，切换国内镜像加速下载依赖
      - name: 配置Node20
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: 切换淘宝npm源
        run: npm config set registry https://registry.npmmirror.com
      - name: 安装axios请求库
        run: npm install axios --no-save

      # 3、执行汇率更新脚本
      - name: 执行更新脚本
        run: node updateRate.js

      # 4、自动提交并推送修改后的html
      - name: 提交更新
        run: |
          git config --global user.name "汇率自动机器人"
          git config --global user.email "bot@github.com"
          git add index.html
          # 无修改则跳过提交，避免空提交
          if git diff --cached --quiet; then
            echo "汇率无变化，无需提交"
          else
            git commit -m "自动更新乌克兰格里夫纳兑人民币汇率"
            git push
          fi
