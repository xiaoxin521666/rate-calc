<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>倒余额计算器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, sans-serif;
        }
        body {
            background-color: #0f1420;
            color: #fff;
            padding: 40px 20px;
            max-width: 600px;
            margin: 0 auto;
        }
        .container {
            background: linear-gradient(145deg, #1a2238, #101629);
            border-radius: 20px;
            padding: 35px 25px;
        }
        h1 {
            text-align: center;
            font-size: 36px;
            margin-bottom: 12px;
            font-weight: 600;
        }
        .rate-desc {
            text-align: center;
            font-size: 18px;
            color: #b0b8d4;
            margin-bottom: 40px;
        }
        .item-title {
            font-size: 26px;
            margin: 30px 0 12px;
            color: #e0e6ff;
        }
        input {
            width: 100%;
            background-color: #272f47;
            border: none;
            border-radius: 14px;
            padding: 18px 20px;
            font-size: 32px;
            color: #fff;
            outline: none;
        }
        #calcBtn {
            width: 100%;
            background-color: #0088ff;
            border: none;
            border-radius: 14px;
            padding: 20px;
            margin: 35px 0;
            font-size: 30px;
            color: white;
            font-weight: 500;
        }
        .result-box {
            background-color: #202840;
            border-radius: 16px;
            padding: 30px 20px;
            text-align: center;
        }
        .result-line {
            font-size: 28px;
            color: #63b8ff;
            margin: 16px 0;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>倒余额计算器</h1>
        <!-- 汇率替换标记，脚本自动修改这行数字 -->
        <div class="rate-desc">今日自动更新汇率：1UAH = 0.151 CNY</div>

        <div class="item-title">单件购入成本（人民币）</div>
        <input type="number" id="costInput" onfocus="this.value=''">

        <div class="item-title">Steam乌克兰区挂牌价（格里夫纳UAH）</div>
        <input type="number" id="uahInput" onfocus="this.value=''">

        <button id="calcBtn">计算比值</button>

        <div class="result-box">
            <div class="result-line" id="priceCny">乌克兰标价折合人民币：<br>0.00 元</div>
            <div class="result-line" id="sellerGet">扣除13%手续费卖家到手：<br>0.00 元</div>
            <div class="result-line" id="discount">当前拿货折算折扣：<br>0.00 折</div>
        </div>
    </div>

<script>
// 汇率变量，脚本会自动更新此处数值
const uah2cny = 0.151;
const taxRate = 0.13; // 13%手续费

const costInput = document.getElementById("costInput");
const uahInput = document.getElementById("uahInput");
const calcBtn = document.getElementById("calcBtn");
const priceCnyDom = document.getElementById("priceCny");
const sellerGetDom = document.getElementById("sellerGet");
const discountDom = document.getElementById("discount");

calcBtn.addEventListener("click", function(){
    const cost = parseFloat(costInput.value) || 0;
    const uahPrice = parseFloat(uahInput.value) || 0;

    if(cost <= 0 || uahPrice <= 0){
        priceCnyDom.innerHTML = "乌克兰标价折合人民币：<br>请输入有效数字";
        sellerGetDom.innerHTML = "扣除13%手续费卖家到手：<br>0.00 元";
        discountDom.innerHTML = "当前拿货折算折扣：<br>0.00 折";
        return;
    }

    // 1. UAH转人民币
    const realCny = (uahPrice * uah2cny).toFixed(2);
    // 2. 扣除13%手续费到手
    const getMoney = (realCny * (1 - taxRate)).toFixed(2);
    // 3. 折扣计算：成本 / 到手价 * 10
    const discountNum = ((cost / getMoney) * 10).toFixed(2);

    priceCnyDom.innerHTML = `乌克兰标价折合人民币：<br>${realCny} 元`;
    sellerGetDom.innerHTML = `扣除13%手续费卖家到手：<br>${getMoney} 元`;
    discountDom.innerHTML = `当前拿货折算折扣：<br>${discountNum} 折`;
})
</script>
</body>
</html>
