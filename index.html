<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>倒余额计算器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, Microsoft Yahei, sans-serif;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #101828, #1f2c48);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        .card {
            background-color: #151b24;
            width: 100%;
            max-width: 480px;
            padding: 32px 24px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.45);
            border: 1px solid #2c3e50;
        }
        h2 {
            color: #ffffff;
            text-align: center;
            margin-bottom: 12px;
            font-size: 26px;
            letter-spacing: 1px;
            font-weight: 500;
        }
        .rate-tip {
            color:#94a3b8;
            font-size:14px;
            margin-bottom:30px;
            text-align: center;
        }
        .input-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            color: #e2e8f0;
            font-size: 20px;
            margin-bottom: 10px;
        }
        input {
            width: 100%;
            padding: 16px 18px;
            border-radius: 14px;
            border: 1px solid #3d4f61;
            background: #1e2633;
            color: #fff;
            font-size: 24px;
        }
        input:focus {
            outline: none;
            border-color: #22a7ff;
        }
        button {
            width: 100%;
            padding: 18px;
            background: linear-gradient(90deg, #22a7ff, #0091d6);
            border: none;
            border-radius: 14px;
            color: white;
            font-size: 20px;
            cursor: pointer;
        }
        #result-box {
            margin-top: 26px;
            padding: 20px;
            background: linear-gradient(135deg, #1e2936, #273646);
            border-radius: 14px;
            text-align: center;
        }
        .result-text {
            color: #66c0f4;
            font-size: 22px;
            font-weight: bold;
            line-height: 1.6;
            white-space: pre-line;
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>倒余额计算器</h2>
        <div class="rate-tip" id="rateTip">今日自动更新汇率：1 UAH = 0.1523 CNY</div>

        <div class="input-group">
            <label>单件购入成本（人民币）</label>
            <input type="text" id="buyPrice" value="2.57" oninput="filterNum(this)">
        </div>

        <div class="input-group">
            <label>Steam乌克兰区挂牌价（格里夫纳UAH）</label>
            <input type="text" id="uahPrice" value="30.78" oninput="filterNum(this)">
        </div>

        <button onclick="calc()">计算比值</button>

        <div id="result-box">
            <div class="result-text" id="output">——</div>
        </div>
    </div>

<script>
    // 【自动更新标记】此处数字会由GitHub机器人每日自动替换
    const uah2cny = 0.1523;

    function filterNum(input) {
        input.value = input.value.replace(/[^\d.]/g, "");
        let dotPos = input.value.indexOf('.');
        if (dotPos !== -1) {
            let int = input.value.slice(0, dotPos);
            let dec = input.value.slice(dotPos + 1, dotPos + 4);
            input.value = int + "." + dec;
        }
    }

    function calc() {
        const buyCost = Number(document.getElementById('buyPrice').value);
        const uahTag = Number(document.getElementById('uahPrice').value);

        if (!buyCost || buyCost <= 0 || !uahTag || uahTag <= 0) {
            document.getElementById('output').innerText = "请输入有效的价格数字";
            return;
        }
        const originalRmb = uahTag * uah2cny;
        const sellerIncome = originalRmb * 0.87;
        const discountPercent = (buyCost / sellerIncome * 100).toFixed(2);

        let text = `乌克兰标价折合人民币：${originalRmb.toFixed(2)} 元\n`;
        text += `扣除13%手续费卖家到手：${sellerIncome.toFixed(2)} 元\n`;
        text += `当前拿货折算折扣：${discountPercent} 折`;
        document.getElementById('output').innerText = text;
    }
</script>
</body>
</html>
