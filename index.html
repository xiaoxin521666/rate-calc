<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>倒余额计算器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, Microsoft Yahei, sans-serif;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #101828, #1f2c48);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        .card {
            background-color: #151b24;
            width: 100%;
            max-width: 480px;
            padding: 32px 24px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.45);
            border: 1px solid #2c3e50;
        }
        h2 {
            color: #ffffff;
            text-align: center;
            margin-bottom: 12px;
            font-size: 26px;
            letter-spacing: 1px;
            font-weight: 500;
        }
        .rate-tip {
            color:#94a3b8;
            font-size:14px;
            margin-bottom:30px;
            text-align: center;
        }
        .input-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            color: #e2e8f0;
            font-size: 20px;
            margin-bottom: 10px;
        }
        input {
            width: 100%;
            padding: 16px 18px;
            border-radius: 14px;
            border: 1px solid #3d4f61;
            background: #1e2633;
            color: #fff;
            font-size: 24px;
        }
        input:focus {
            outline: none;
            border-color: #22a7ff;
        }
        .btn-calc {
            width: 100%;
            padding: 18px;
            background: linear-gradient(90deg, #22a7ff, #0091d6);
            border: none;
            border-radius: 14px;
            color: white;
            font-size: 20px;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .btn-calc:hover {
            opacity: 0.9;
        }
        .btn-reset {
            width: 100%;
            padding: 14px;
            margin-top: 14px;
            background: #2c3a4e;
            border: none;
            border-radius: 14px;
            color: #b1c4dd;
            font-size: 18px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-reset:hover {
            background: #384860;
        }
        #result-box {
            margin-top: 26px;
            padding: 20px;
            background: linear-gradient(135deg, #1e2936, #273646);
            border-radius: 14px;
            text-align: center;
        }
        .result-text {
            color: #66c0f4;
            font-size: 22px;
            font-weight: bold;
            line-height: 1.6;
            white-space: pre-line;
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>倒余额计算器</h2>
        <div class="rate-tip" id="rateTip">今日自动更新汇率：1 UAH = 0.1523 CNY</div>

        <div class="input-group">
            <label>单件购入成本（人民币）</label>
            <!-- onfocus点击自动清空，回车计算 -->
            <input type="text" id="buyPrice" value="" onfocus="this.value=''" oninput="filterNum(this)" onkeydown="enterCalc(event)">
        </div>

        <div class="input-group">
            <label>Steam乌克兰区挂牌价（格里夫纳UAH）</label>
            <input type="text" id="uahPrice" value="" onfocus="this.value=''" oninput="filterNum(this)" onkeydown="enterCalc(event)">
        </div>

        <button class="btn-calc" onclick="calc()">计算比值</button>
        <button class="btn-reset" onclick="resetAll()">一键清空全部</button>

        <div id="result-box">
            <div class="result-text" id="output">——</div>
        </div>
    </div>

<script>
    // 【自动更新标记】此处数字会由GitHub机器人每小时自动替换
    const uah2cny = 0.1523;

    // 修改：允许多个小数点，仅过滤字母符号，不限制小数点数量
    function filterNum(input) {
        // 只保留数字和小数点，其他字符全部清除
        input.value = input.value.replace(/[^\d.]/g, "");
    }

    // 回车触发计算
    function enterCalc(e) {
        if(e.key === "Enter") calc();
    }

    // 一键清空所有输入与结果
    function resetAll() {
        document.getElementById("buyPrice").value = "";
        document.getElementById("uahPrice").value = "";
        document.getElementById("output").innerText = "——";
    }

    function calc() {
        const buyCost = Number(document.getElementById('buyPrice').value);
        const uahTag = Number(document.getElementById('uahPrice').value);

        if (!buyCost || buyCost <= 0 || !uahTag || uahTag <= 0) {
            document.getElementById('output').innerText = "请输入有效的价格数字";
            return;
        }
        const originalRmb = uahTag * uah2cny;
        const sellerIncome = originalRmb * 0.87;
        const discountPercent = (buyCost / sellerIncome * 100).toFixed(2);
