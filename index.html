<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>倒余额计算器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, Microsoft Yahei, sans-serif;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #101828, #1f2c48);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        .card {
            background-color: #151b24;
            width: 100%;
            max-width: 480px;
            padding: 32px 24px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.45);
            border: 1px solid #2c3e50;
        }
        h2 {
            color: #ffffff;
            text-align: center;
            margin-bottom: 12px;
            font-size: 26px;
            letter-spacing: 1px;
            font-weight: 500;
        }
        .rate-tip {
            color:#94a3b8;
            font-size:14px;
            margin-bottom:30px;
            text-align: center;
        }
        .input-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            color: #e2e8f0;
            font-size: 20px;
            margin-bottom: 10px;
        }
        input {
            width: 100%;
            padding: 16px 18px;
            border-radius: 14px;
            border: 1px solid #3d4f61;
            background: #1e2633;
            color: #fff;
            font-size: 24px;
            transition: all 0.25s ease;
        }
        input:focus {
            outline: none;
            border-color: #22a7ff;
            box-shadow: 0 0 0 4px rgba(102, 192, 244, 0.15);
            background: #232d3b;
        }
        button {
            width: 100%;
            padding: 18px;
            margin-top: 6px;
            background: linear-gradient(90deg, #22a7ff, #0091d6);
            border: none;
            border-radius: 14px;
            color: white;
            font-size: 20px;
            font-weight: 500;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        button:active {
            opacity: 0.85;
            transform: scale(0.98);
        }
        #result-box {
            margin-top: 26px;
            padding: 20px;
            background: linear-gradient(135deg, #1e2936, #273646);
            border-radius: 14px;
            text-align: center;
        }
        .result-text {
            color: #66c0f4;
            font-size: 22px;
            font-weight: bold;
            line-height: 1.6;
            white-space: pre-line;
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>倒余额计算器</h2>
        <div class="rate-tip" id="rateTip">正在自动获取国内实时汇率...</div>

        <div class="input-group">
            <label>单件购入成本（人民币）</label>
            <input type="text" id="buyPrice" value="2.57" oninput="onlyNumberDot(this)">
        </div>

        <div class="input-group">
            <label>Steam乌克兰区挂牌价（格里夫纳UAH）</label>
            <input type="text" id="uahPrice" value="30.78" oninput="onlyNumberDot(this)">
        </div>

        <button onclick="calcRatio()">计算比值</button>

        <div id="result-box">
            <div class="result-text" id="ratioOutput">——</div>
        </div>
    </div>

<script>
    // 网络异常兜底汇率（1格里夫纳≈0.1517人民币）
    let baseRate = 0.1517;
    const rateTipDom = document.getElementById('rateTip');

    window.onload = async function () {
        await getCNRate();
    }

    // 国内可直连汇率接口，无需翻墙
    async function getCNRate() {
        try {
            // 国内公开无跨域限制汇率接口
            const res = await fetch('https://api.waihui123.com/reteapi?action=all');
            const data = await res.json();
            // UAH 乌克兰格里夫纳兑人民币汇率
            const uahToCny = data.data.UAH_CNY;
            baseRate = Number(uahToCny);
            rateTipDom.innerText = `实时汇率：1格里夫纳 ≈ ${baseRate.toFixed(4)} 人民币`;
            // 本地缓存汇率，24小时内不再重复请求
            localStorage.setItem('local_uah_rate', JSON.stringify({
                rate: baseRate,
                time: Date.now()
            }));
        } catch (err) {
            // 读取本地缓存汇率，无缓存则使用兜底固定值
            const cache = localStorage.getItem('local_uah_rate');
            if (cache) {
                const cacheData = JSON.parse(cache);
                baseRate = cacheData.rate;
                rateTipDom.innerText = `缓存汇率：1格里夫纳 ≈ ${baseRate.toFixed(4)} 人民币（联网失败）`;
            } else {
                rateTipDom.innerText = `联网获取汇率失败，使用参考汇率：1格里夫纳 ≈ ${baseRate} 人民币`;
            }
        }
    }

    // 输入框限制仅数字和小数点
